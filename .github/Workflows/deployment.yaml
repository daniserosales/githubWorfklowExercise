name: Deploy to UAT
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '14'
      - name: Install dependencies
        run: npm install
      - name: Run tests
        run: npm test
      - name: Deploy to UAT
        if: success()
        run: echo "Deploying to UAT environment..."
  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to UAT
        run: echo "Deployment to UAT environment successful!"
